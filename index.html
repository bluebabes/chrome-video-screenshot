<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoShot - 专业的视频截图 Chrome 扩展</title>
  <style>
    :root {
      --primary-blue: #2d5cf7;
      --dark-bg: #0f172a;
      --text-light: #f8fafc;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-light);
      margin: 0;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }

    /* Hero Section */
    header {
      padding: 80px 20px;
    }

    .logo {
      width: 120px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(45, 92, 247, 0.3);
    }

    h1 {
      font-size: 3rem;
      margin: 20px 0;
    }

    p.subtitle {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    .btn-install {
      background: var(--primary-blue);
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      transition: transform 0.2s;
      display: inline-block;
    }

    .btn-install:hover {
      transform: scale(1.05);
    }

    /* Features */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin: 60px 0;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .feature-card h3 {
      color: var(--primary-blue);
    }

    footer {
      padding: 40px;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <img src="imgs/icon.png" alt="Logo" class="logo"> <!-- 替换成你的图标路径 -->
      <h1>视频截图工具</h1>
      <p class="subtitle">一键截取网页视频高清帧，为创作者而生的 Chrome 工具。</p>
      <a href="你的Chrome商店链接" class="btn-install">添加到 Chrome - 免费使用</a>
    </header>

    <section class="demo">
      <!-- 这里建议放一张你工具操作的 GIF 截图 -->
      <div style="background: #1e293b; padding: 20px; border-radius: 10px;">
        <p style="color: #64748b;"><img style="max-width:800px;" src="imgs/Katy Perry - Dark Horse ft. Juicy J_00m03s_2x2_preview.jpg" /></p>
        <p style="color: #64748b;"><img style="max-width:800px;" src="imgs/Katy Perry - Dark Horse ft. Juicy J_00m01s.png" /></p>
        <p style="color: #64748b;"><img style="max-width:800px;" src="imgs/Katy Perry - Dark Horse ft. Juicy J_00m30s.jpg" /></p>
        <p style="color: #64748b;"><img style="max-width:800px;" src="imgs/your babe intense workout at Home 👀🤍_02m23s_2x2_preview.jpg" /></p>
      </div>
    </section>

    <section class="features">
      <div class="feature-card">
        <h3>高清无损</h3>
        <p>直接抓取视频原始分辨率，告别系统截图的模糊与黑屏。</p>
      </div>
      <div class="feature-card">
        <h3>智能命名</h3>
        <p>自动关联视频标题与时间进度，素材管理井井有条。</p>
      </div>
      <div class="feature-card">
        <h3>快捷操作</h3>
        <p>支持自定义快捷键，在观看过程中实现“无感”截图。</p>
      </div>
    </section>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1);">

    <footer>
      <p>在 GitHub 上关注此项目 | 开源协议 MIT</p>
    </footer>
  </div>

</body>

</html>
